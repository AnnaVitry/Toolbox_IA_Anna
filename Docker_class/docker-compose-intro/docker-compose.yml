version: '3.9'

networks:
  app_network:
    driver: bridge

services:
  # 1. LA BASE DE DONNÉES CENTRALE (fusion de 'db' et 'stack')
  mysql_db:
    image: mysql:5.7
    container_name: projet_db
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    ports:
      - "${MYSQL_PORT}:3306" # La magie opère ici : 3310 vers 3306
    env_file:
      - .env
    networks:
      - app_network

  # 2. L'INTERFACE DE GESTION BDD
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: projet_pma
    environment:
      - PMA_HOST=mysql_db # Remarquez comment PMA pointe directement vers le nom du service DB
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PHPMYADMIN_PORT}:80"
    depends_on:
      - mysql_db
    networks:
      - app_network

  # 3. LE SERVEUR WEB APACHE
  apache:
    image: php:7.4-apache
    container_name: projet_apache
    volumes:
      - ./stack/www:/var/www/html
    ports:
      - "${APACHE_PORT}:80"
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    depends_on:
      - mysql_db
    networks:
      - app_network

  # 4. LE BACKEND FASTAPI
  api:
    build: 
      context: ./fastapi_env # Pointe vers le sous-dossier contenant le Dockerfile
    container_name: projet_fastapi
    ports:
      - "${API_PORT}:8080" # Changé pour éviter le conflit avec Streamlit
    environment:
      - DB_HOST=mysql_db # L'API peut maintenant parler à la DB en interne
    depends_on:
      - mysql_db
    networks:
      - app_network

  # 5. LE FRONTEND STREAMLIT
  streamlit_app:
    build:
      context: ./streamlit_env
    container_name: projet_streamlit
    ports:
      - "${PORT}:8501" # Port standard de Streamlit, ne rentre plus en conflit avec FastAPI
    depends_on:
      - api
    networks:
      - app_network